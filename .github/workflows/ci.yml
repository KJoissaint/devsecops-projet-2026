name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  lint-dockerfile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/flask/Dockerfile

  lint-yaml:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint YAML files with yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: kube
          config_file: .yamllint

  conftest-check:
    runs-on: ubuntu-latest
    needs: lint-yaml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          CONTEST_VERSION=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          wget -O conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/${CONTEST_VERSION}/conftest_${CONTEST_VERSION#v}_Linux_x86_64.tar.gz"
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run Conftest security policy check
        run: conftest test kube/ --policy policy/

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [lint-dockerfile, lint-yaml]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'

  build-docker:
    runs-on: ubuntu-latest
    needs: [conftest-check, trivy-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/flask/Dockerfile
          push: false
          load: true
          tags: flask-app:latest

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          scan-type: 'image'
          image-ref: 'flask-app:latest'
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
